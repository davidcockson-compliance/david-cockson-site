<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>david-cockson@cloud:~</title>
    <meta name="description" content="David Cockson | Compliance Architect | Cloud & AI Systems">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 opacity=%220.9%22>🐸</text></svg>">
    <style>
        :root {
            --bg-color: #050505;
            --term-bg: rgba(10, 10, 10, 0.82);
            --text-color: #dcdcdc;
            --prompt-color: #a6e22e;
            --link-color: #66d9ef;
            --accent-glow: rgba(166, 226, 46, 0.25);
            --glass-border: rgba(255, 255, 255, 0.05);
        }
        ::selection { background: var(--prompt-color); color: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg-color); color: var(--text-color); font-family: 'Fira Code', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.12; filter: blur(1px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%); background-size: 100% 2px, 100% 100%; pointer-events: none; z-index: 10; }
        .terminal-container { width: 95%; max-width: 850px; height: 75vh; background: var(--term-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 12px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); display: flex; flex-direction: column; animation: emerge 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .terminal-header { padding: 14px 20px; background: rgba(255, 255, 255, 0.02); display: flex; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; opacity: 0.7; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .title { margin-left: 20px; font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
        .terminal-body { padding: 35px; overflow-y: auto; flex-grow: 1; font-size: 15px; line-height: 1.6; scrollbar-width: none; scroll-behavior: smooth; }
        .line { margin-bottom: 18px; }
        .prompt { color: var(--prompt-color); text-shadow: 0 0 5px var(--accent-glow); font-weight: 500; }
        .command { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .output { color: var(--text-color); margin-top: 6px; display: block; opacity: 0.85; }
        a { color: var(--link-color); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        a:hover { color: #fff; border-bottom: 1px solid var(--link-color); text-shadow: 0 0 8px var(--link-color); }
        .cursor { display: inline-block; width: 10px; height: 18px; background: var(--prompt-color); margin-left: 5px; animation: blink 1s step-end infinite; vertical-align: middle; box-shadow: 0 0 8px var(--accent-glow); }
        pre { margin: 0; font-family: inherit; color: var(--prompt-color); }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes emerge { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .terminal-body { padding: 20px; font-size: 13px; } .title { display: none; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay"></div>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
            <div class="title">david@cockson-cloud: ~ (ssh)</div>
        </div>
        <div class="terminal-body" id="terminal"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = '01'; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillStyle = Math.random() > 0.95 ? '#1a1a1a' : '#0a0a0a';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 60);

        const terminal = document.getElementById('terminal');
        const content = [
            { cmd: "whoami", res: "David Cockson | Compliance Architect | Cloud & AI Systems" },
            { cmd: "cat philosophy.txt", res: "Tao of Pratchett. Map the gap. Architect the control." },
            { cmd: "ls -l /contact/", res: `github   -> <a href="https://github.com/davidcockson-compliance" target="_blank">github.com/davidcockson-compliance</a><br>linkedin -> <a href="https://www.linkedin.com/in/david-cockson" target="_blank">linkedin.com/in/david-cockson</a><br>email    -> <a href="mailto:hello@davidcockson.com">hello@davidcockson.com</a>` }
        ];

        async function typeLine(item) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">david-cockson@cloud:~$</span> <span class="command"></span>`;
            terminal.appendChild(line);
            const cmdSpan = line.querySelector('.command');
            for (let i = 0; i < item.cmd.length; i++) {
                cmdSpan.innerHTML += item.cmd[i];
                await new Promise(r => setTimeout(r, 45));
            }
            const res = document.createElement('span');
            res.className = 'output';
            res.innerHTML = item.res;
            line.appendChild(res);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function start() {
            await new Promise(r => setTimeout(r, 800));
            for (const item of content) {
                await typeLine(item);
                await new Promise(r => setTimeout(r, 700));
            }
            addActivePrompt();
        }

        function addActivePrompt() {
            const lastLine = document.createElement('div');
            lastLine.id = 'active-line';
            lastLine.className = 'line';
            lastLine.innerHTML = `<span class="prompt">david-cockson@cloud:~$</span><span class="cursor"></span>`;
            terminal.appendChild(lastLine);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // The Secret Frog Listener
        let inputBuffer = "";
        window.addEventListener("keydown", async (e) => {
            if (e.key.length === 1) {
                inputBuffer += e.key.toLowerCase();
                if (inputBuffer.includes("frog")) {
                    inputBuffer = "";
                    const active = document.getElementById('active-line');
                    if(active) active.remove();
                    await typeLine({ 
                        cmd: "cat guardian.log", 
                        res: `<pre>\n  (o)---(o)\n   ( . . )  [ STATUS: ACTIVE ]\n    \\___/   [ MODE: GUARDIAN ]\n   /     \\\n  |       |  Systems monitored. Partner verified.\n</pre>` 
                    });
                    addActivePrompt();
                }
                if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
            }
        });

        window.onload = start;
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
