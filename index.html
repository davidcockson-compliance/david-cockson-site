<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>david-cockson@cloud:~</title>
    
    <meta name="description" content="David Cockson | T-shaped Generalist | Cloud, Infrastructure & AI Systems">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 fill=%22%23a6e22e%22 font-family=%22monospace%22 font-weight=%22bold%22>>_</text></svg>">

    <style>
        :root {
            --bg-color: #050505;
            --term-bg: rgba(10, 10, 10, 0.85);
            --text-color: #dcdcdc;
            --prompt-color: #a6e22e;
            --link-color: #66d9ef;
            --accent-glow: rgba(166, 226, 46, 0.2);
            --glass-border: rgba(255, 255, 255, 0.05);
            --yaml-key: #66d9ef; /* cyan */
            --yaml-string: #e6db74; /* yellow */
            --yaml-tags: #fd971f; /* orange */
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        ::selection { background: var(--prompt-color); color: #000; }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; opacity: 0.1; filter: blur(1px); 
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%),
                radial-gradient(circle, rgba(0,0,0,0) 65%, rgba(0,0,0,0.4) 100%);
            background-size: 100% 2px, 100% 100%;
            pointer-events: none; z-index: 10;
        }

        .terminal-container {
            width: 95%; max-width: 850px; height: 75vh;
            background: var(--term-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.02);
            display: flex; flex-direction: column;
            animation: emerge 1.2s cubic-bezier(0.16, 1, 0.3, 1), flicker 0.12s 3;
        }

        .terminal-header {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.02);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .title { margin-left: 20px; font-size: 11px; color: #444; letter-spacing: 1.5px; text-transform: uppercase; }

        .terminal-body {
            padding: 35px; overflow-y: auto; flex-grow: 1; font-size: 15px; line-height: 1.7;
            scrollbar-width: none; scroll-behavior: smooth;
            padding-bottom: 60px;
        }
        .terminal-body::-webkit-scrollbar { display: none; }

        .line { margin-bottom: 20px; }
        .prompt { color: var(--prompt-color); text-shadow: 0 0 5px var(--accent-glow); }
        .command { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.1); }
        .output { color: var(--text-color); margin-top: 8px; display: block; opacity: 0.8; text-shadow: 0 0 2px rgba(255,255,255,0.05); }
        .output-multiline { white-space: pre; margin-top: 8px; }
        
        a { color: var(--link-color); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        a:hover { color: #fff; border-bottom: 1px solid var(--link-color); text-shadow: 0 0 10px var(--link-color); }

        .cursor {
            display: inline-block; width: 10px; height: 18px;
            background: var(--prompt-color); margin-left: 5px;
            animation: blink 1s step-end infinite; vertical-align: middle;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        pre { margin: 0; font-family: inherit; color: var(--prompt-color); filter: drop-shadow(0 0 5px var(--accent-glow)); }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes emerge { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes flicker {
            0% { opacity: 0.9; filter: brightness(1.3); transform: scaleX(1.01); }
            50% { opacity: 1; filter: brightness(1); transform: scaleX(1); }
            100% { opacity: 0.9; filter: brightness(1.2); }
        }

        @media (max-width: 600px) { 
            .terminal-body { padding: 20px; font-size: 13px; } 
            .title { display: none; } 
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="overlay"></div>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="dots"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div></div>
            <div class="title">david@cockson-cloud: ~ (ssh)</div>
        </div>
        <div class="terminal-body" id="terminal"></div>
    </div>

    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = '01'; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillStyle = Math.random() > 0.97 ? '#151515' : '#080808';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 70);

        const cYAML_KEY = 'style="color: var(--yaml-key);"';
        const cYAML_STR = 'style="color: var(--yaml-string);"';
        const cYAML_TAG = 'style="color: var(--yaml-tags);"';
        const cGITHUB_URL = 'https://github.com/davidcockson-compliance';

        // --- TERMINAL CONTENT ---
        const terminal = document.getElementById('terminal');

        const content = [
            { cmd: "whoami", res: "David Cockson | T-shaped Generalist | Cloud, Infrastructure & AI Systems" },
            { cmd: "cat philosophy.txt", res: "Map the gap. Architect the control." },
            { cmd: "ls -l /links/", res: [
                `cv       -> <a href="/cv" target="_blank">davidcockson.com/cv</a>`,
                `blog     -> <a href="https://blog.davidcockson.com" target="_blank">blog.davidcockson.com</a>`,
                `github   -> <a href="https://github.com/davidcockson-compliance" target="_blank">github.com/davidcockson-compliance</a>`,
                `linkedin -> <a href="https://www.linkedin.com/in/david-cockson" target="_blank">linkedin.com/in/david-cockson</a>`,
                `email    -> <a href="mailto:hello@davidcockson.com">hello@davidcockson.com</a>`
            ]},
            { cmd: "cat /var/deployments/workloads.yaml", res: [
                `<span style="color: #f92672;">workloads:</span>`,
                `  - <span ${cYAML_KEY}>name:</span> <span ${cYAML_STR}>"LCCP Regulation Filter"</span>`,
                `    <span ${cYAML_KEY}>url:</span>  <a href="https://lccp-filter.davidcockson.com" target="_blank">https://lccp-filter.davidcockson.com</a>`,
                `    <span ${cYAML_KEY}>tags:</span> [<span ${cYAML_TAG}>React</span>, <span ${cYAML_TAG}>Vite</span>, <span ${cYAML_TAG}>Cloudflare</span>]`,
                ``,
                `  - <span ${cYAML_KEY}>name:</span> <span ${cYAML_STR}>"Scarlet Helix"</span>`,
                `    <span ${cYAML_KEY}>url:</span>  <a href="https://scarlet-helix.davidcockson.com" target="_blank">https://scarlet-helix.davidcockson.com</a>`,
                `    <span ${cYAML_KEY}>tags:</span> [<span ${cYAML_TAG}>Vanilla JS</span>, <span ${cYAML_TAG}>Data Pipeline</span>, <span ${cYAML_TAG}>Cloudflare</span>]`,
                ``,
                `  - <span ${cYAML_KEY}>name:</span> <span ${cYAML_STR}>"Blog"</span>`,
                `    <span ${cYAML_KEY}>url:</span>  <a href="https://blog.davidcockson.com" target="_blank">https://blog.davidcockson.com</a>`,
                `    <span ${cYAML_KEY}>tags:</span> [<span ${cYAML_TAG}>Writing</span>, <span ${cYAML_TAG}>Compliance</span>, <span ${cYAML_TAG}>Tech</span>]`
            ]},
            { cmd: "cat /etc/github/pinned_repos.yaml", res: [
                `<span style="color: #f92672;">github_pinned_repositories:</span>`,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"infra-practice"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "Infrastructure as Code practice — Terraform, Python automation, CI/CD"`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/infra-practice" target="_blank">${cGITHUB_URL}/infra-practice</a>`,
                `    <span ${cYAML_KEY}>lang:</span> [<span ${cYAML_TAG}>HCL</span>]`,
                ``,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"homelab-monitoring"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "Prometheus + Grafana monitoring stack for a home server."`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/homelab-monitoring" target="_blank">${cGITHUB_URL}/homelab-monitoring</a>`,
                ``,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"scarlet-helix"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "Intelligence tool tracking UK Gambling Commission licenses."`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/scarlet-helix" target="_blank">${cGITHUB_URL}/scarlet-helix</a>`,
                `    <span ${cYAML_KEY}>lang:</span> [<span ${cYAML_TAG}>JavaScript</span>]`,
                ``,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"lccp-regulation-filter"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "LCCP regulation filter with gap analysis built in."`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/lccp-regulation-filter" target="_blank">${cGITHUB_URL}/lccp-regulation-filter</a>`,
                `    <span ${cYAML_KEY}>lang:</span> [<span ${cYAML_TAG}>JavaScript</span>]`,
                ``,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"pickles-gmbh-ai-governance-framework"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "Open-source AI governance framework for German legal AI providers."`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/pickles-gmbh-ai-governance-framework" target="_blank">${cGITHUB_URL}/pickles-gmbh-ai-governance-framework</a>`,
                ``,
                `  - <span ${cYAML_KEY}>repo:</span> <span ${cYAML_STR}>"homelab"</span>`,
                `    <span ${cYAML_KEY}>desc:</span> "Self-hosted infrastructure running on Proxmox and Docker."`,
                `    <span ${cYAML_KEY}>link:</span> <a href="${cGITHUB_URL}/homelab" target="_blank">${cGITHUB_URL}/homelab</a>`
            ]}
        ];

        async function typeLine(item) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">david-cockson@cloud:~$</span> <span class="command"></span>`;
            terminal.appendChild(line);
            
            const cmdSpan = line.querySelector('.command');
            for (let i = 0; i < item.cmd.length; i++) {
                cmdSpan.innerHTML += item.cmd[i];
                await new Promise(r => setTimeout(r, 40));
            }

            const resContainer = document.createElement('div');
            
            if (Array.isArray(item.res)) {
                resContainer.className = 'output output-multiline';
                line.appendChild(resContainer);
                for (let j = 0; j < item.res.length; j++) {
                    resContainer.innerHTML += item.res[j] + '\n';
                    terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
                    await new Promise(r => setTimeout(r, 70));
                }
            } else {
                resContainer.className = 'output';
                resContainer.innerHTML = item.res;
                line.appendChild(resContainer);
                terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
            }
        }

        async function start() {
            await new Promise(r => setTimeout(r, 1200));
            for (const item of content) {
                await typeLine(item);
                await new Promise(r => setTimeout(r, 600));
            }
            addActivePrompt();
        }

        function addActivePrompt() {
            const lastLine = document.createElement('div');
            lastLine.id = 'active-line';
            lastLine.className = 'line';
            lastLine.innerHTML = `<span class="prompt">david-cockson@cloud:~$</span><span class="cursor"></span>`;
            terminal.appendChild(lastLine);
            terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
        }

        let inputBuffer = "";
        window.addEventListener("keydown", async (e) => {
            if (e.key.length === 1) {
                inputBuffer += e.key.toLowerCase();
                if (inputBuffer.includes("frog")) {
                    inputBuffer = "";
                    const active = document.getElementById('active-line');
                    if (active) active.remove();
                    await typeLine({ 
                        cmd: "cat guardian.log", 
                        res: [
                            `<pre>`,
                            `  (o)---(o)`,
                            `   ( . . )  [ STATUS: ACTIVE ]`,
                            `    \\___/   [ AUTH: WIB ]`,
                            `   /     \\`,
                            `  |       |  Systems monitored. Wib verified.`,
                            `</pre>`
                        ]
                    });
                    addActivePrompt();
                }
                if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
            }
        });

        document.addEventListener('DOMContentLoaded', start);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
